# cPanel "Git Version Control" auto-deploy hook for digisync's account.
# Repo is checked out at /home/digisync/designs.digisyn.co. Astro's own
# build output directory (dist/) lives right inside that checkout, so no
# copy/rsync step is needed — we just need to build in place.
#
# Node.js App confirmed 2026-07-02: cPanel > Setup Node.js App, version
# 18.20.8, application root designs.digisyn.co. The activate path below is
# the real, verified one (not a guess) — confirmed via Terminal.
#
# STILL NEEDED: cPanel > Domains > designs.digisyn.co > change the Document
# Root from /home/digisync/designs.digisyn.co to
# /home/digisync/designs.digisyn.co/dist, so only built output is
# web-exposed (not src/, package.json, etc).

---
deployment:
  tasks:
    - source /home/digisync/nodevenv/designs.digisyn.co/18/bin/activate
    - npm install
    - npm run build
