# cPanel "Git Version Control" auto-deploy hook for digisync's account.
# Repo is checked out at /home/digisync/designs.digisyn.co. Astro's own
# build output directory (dist/) lives right inside that checkout, so no
# copy/rsync step is needed — we just need to build in place.
#
# ACTION NEEDED IN cPANEL (one-time, UI-only, I can't do this from here):
#   1. cPanel > Domains > designs.digisyn.co > change the Document Root
#      from /home/digisync/designs.digisyn.co
#      to   /home/digisync/designs.digisyn.co/dist
#      This keeps package.json, src/, tsconfig.json, etc. outside the
#      public web root — only the built HTML/CSS/JS in dist/ is served.
#   2. Confirm the Node.js virtualenv path below matches what's shown under
#      cPanel > Setup Node.js App for this project (create an app pointed at
#      this checkout path if one doesn't exist yet; any recent Node 18/20
#      is fine). The version number in the path (currently "20") may need
#      to change to match. Without this, `npm`/`npx` won't be on PATH when
#      cPanel runs this hook and the deploy will silently fail (this is
#      likely why "Last Deployment Information" showed "Not available").
#   3. After both are set, click "Deploy HEAD Commit" in Git Version
#      Control (or just push a new commit) to trigger it.

---
deployment:
  tasks:
    - source /home/digisync/nodevenv/designs.digisyn.co/20/bin/activate
    - npm install
    - npm run build
