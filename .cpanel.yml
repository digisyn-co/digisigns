# cPanel "Git Version Control" auto-deploy hook.
# When this repo is added under cPanel > Git Version Control and this file
# exists at the repo root, cPanel runs the `deployment.tasks` commands after
# every pull, relative to the repo's clone path on the server.
#
# ACTION NEEDED BEFORE THIS WORKS (values are placeholders):
#   1. Replace CPANEL_USERNAME below with your actual cPanel account username.
#   2. Replace DEPLOYPATH with the public_html path this site should publish to
#      (use a subfolder, e.g. public_html/ or public_html/mysite/, depending on
#      whether this is the primary domain or an addon domain).
#   3. Node/npm must be reachable in the shell cPanel uses to run this hook.
#      Most shared cPanel hosts only expose Node via "Setup Node.js App"
#      (Passenger), which installs it under a virtualenv-style path, e.g.:
#        source /home/CPANEL_USERNAME/nodevenv/repo/20/bin/activate
#      Create a Node.js App pointing at this repo's checkout path first, note
#      the Node version it gives you, then uncomment/adjust the `source` line
#      below to match. Without this, `npm` will not be found and the deploy
#      task will fail silently from cPanel's perspective (check the Git
#      Version Control deploy log in cPanel if the live site doesn't update).

---
deployment:
  tasks:
    - export DEPLOYPATH=/home/CPANEL_USERNAME/public_html/
    # - source /home/CPANEL_USERNAME/nodevenv/repo/20/bin/activate
    - npm install
    - npm run build
    - /bin/cp -R dist/* $DEPLOYPATH
